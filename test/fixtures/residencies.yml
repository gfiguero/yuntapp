# Residencies are created dynamically during onboarding approval.
# Most test scenarios create them in setup helpers.
# Named residencies only for fixtures that need them pre-existing.

selendis_residency:
  verified_identity: selendis_persona
  verified_residence: selendis_verified_residence
  household_unit: selendis_household
  family_group: selendis_family_group
  household_admin: true
  status: "approved"

# Residente dependiente en el mismo grupo familiar de selendis (jefe de hogar).
# Usado para probar la cascada de desactivación (BR-037).
vorazun_residency:
  verified_identity: vorazun_persona
  verified_residence: selendis_verified_residence
  household_unit: selendis_household
  family_group: selendis_family_group
  household_admin: false
  status: "approved"
