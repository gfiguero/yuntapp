  status: "approved"
  approved_at: <%= Time.zone.now %>

vorazun_dependent:
  neighborhood_association: manios_de_buin
  verified_identity: vorazun_persona
  status: "approved"
  approved_at: <%= Time.zone.now %>

fenix_dependent:
